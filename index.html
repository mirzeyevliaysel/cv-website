<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CV</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #0066cc;
            padding-bottom: 10px;
        }
        h2 {
            color: #0066cc;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Your Name</h1>
        <p>Email: your.email@example.com | Phone: (123) 456-7890</p>
        
        <h2>Summary</h2>
        <p>Add your professional summary here.</p>
        
        <h2>Experience</h2>
        <ul>
            <li><strong>Job Title</strong> - Company Name (2020-Present)</li>
            <li><strong>Previous Job</strong> - Previous Company (2018-2020)</li>
        </ul>
        
        <h2>Skills</h2>
        <ul>
            <li>HTML/CSS</li>
            <li>JavaScript</li>
        </ul>
    </div>
</body>
</html>
